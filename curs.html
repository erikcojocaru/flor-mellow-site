        if (unlockedChapters.includes(index)) {
          setActiveChapter(index);
          setShowQuiz(false);
          setQuizAnswers({});
          setQuizSubmitted(false);
        }

        if (!quizSubmitted) {
          setQuizAnswers((prev) => ({ ...prev, [qIndex]: aIndex }));

        const allCorrect = chapter.quiz.every((q, i) => quizAnswers[i] === q.correct);

        setQuizPassed(allCorrect);

            setCompletedChapters((prev) => [...prev, activeChapter]);

          if (next < COURSE_DATA.chapters.length && !unlockedChapters.includes(next)) {
            setUnlockedChapters((prev) => [...prev, next]);
          }
        }

        const next = activeChapter + 1;
        if (next < COURSE_DATA.chapters.length) {

          setQuizAnswers({});

                  >
                    <div className="ch-header">
                      <div className={`ch-num ${getChNumClass(i)}`}>
                        {completedChapters.includes(i) ? "✓" : i + 1}
                      </div>
                      <div className="ch-title">{ch.title}</div>
                    </div>
                    <div className="ch-meta">
                      {!unlockedChapters.includes(i) ? "🔒 Blocat" : `▶ ${ch.duration}`}
                      {completedChapters.includes(i) && " · Finalizat"}
                    </div>
                  </div>
                ))}
              </div>

              <div className="main">
                {allDone ? (
                  <div className="completion">
                    <span className="completion-icon">🌸</span>
                    <div className="completion-title">Felicitări!</div>
                    <div className="completion-text">
                      Ai finalizat cursul complet. Ești gata să creezi buchete de zefir cu adevărat memorabile.
                    </div>
                    <button className="btn-primary">📄 Descarcă Certificatul</button>
                  </div>
                ) : (
                  <>
                    <div className="video-wrap">
                      {isLocked ? (
                        <div className="video-overlay">
                          <div className="lock-icon">🔒</div>
                          <div className="lock-text">Lecție blocată</div>
                          <div className="lock-sub">Finalizează lecția anterioară pentru a debloca</div>
                        </div>
                      ) : (
                        <iframe
                          src={`https://www.youtube.com/embed/${chapter.videoId}?rel=0&modestbranding=1`}
                          allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope"
                          allowFullScreen
                        />
                      )}
                    </div>

                    <div className="ch-info-title">
                      <span style={{ color: "#c8906a", fontStyle: "italic", marginRight: 8 }}>
                        {activeChapter + 1}.
                      </span>
                      {chapter.title}
                    </div>
                    <div className="ch-info-desc">{chapter.description}</div>

                    {!isLocked && (
                      <div className="actions">
                        {!isDone && !showQuiz && (
                          <button className="btn-primary" onClick={() => setShowQuiz(true)}>
                            ✏️ Testează-ți cunoștințele
                          </button>
                        )}
                        <button className="btn-secondary">
                          📄 Descarcă {chapter.pdf}
                        </button>
                        {isDone && activeChapter < COURSE_DATA.chapters.length - 1 && (
                          <button className="btn-primary" onClick={handleNextChapter}>
                            Lecția următoare →
                          </button>
                        )}
                      </div>
                    )}

                    {showQuiz && !isLocked && (
                      <div className="quiz-section">
                        <div className="quiz-header">Quiz — {chapter.title}</div>
                        <div className="quiz-subheader">
                          Răspunde corect la toate întrebările pentru a debloca lecția următoare.
                        </div>

                        {chapter.quiz.map((q, qi) => (
                          <div className="question-block" key={qi}>
                            <div className="question-text">
                              <span className="q-num">{qi + 1}</span>
                              {q.question}
                            </div>
                            <div className="options">
                              {q.options.map((opt, oi) => {
                                let cls = "option";
                                if (quizSubmitted) {
                                  cls += " disabled";
                                  if (oi === q.correct) cls += " correct";
                                  else if (quizAnswers[qi] === oi) cls += " wrong";
                                } else if (quizAnswers[qi] === oi) {
                                  cls += " selected";
                                }
                                return (
                                  <div key={oi} className={cls} onClick={() => handleAnswer(qi, oi)}>
                                    <div className="option-dot">
                                      {quizAnswers[qi] === oi && !quizSubmitted ? "●" : ""}
                                      {quizSubmitted && oi === q.correct ? "✓" : ""}
                                      {quizSubmitted && quizAnswers[qi] === oi && oi !== q.correct ? "✗" : ""}
                                    </div>
                                    {opt}
                                  </div>
                                );
                              })}
                            </div>
                          </div>
                        ))}

                        {!quizSubmitted ? (
                          <div className="quiz-actions">
                            <button
                              className="btn-primary"
                              onClick={handleSubmitQuiz}
                              disabled={Object.keys(quizAnswers).length < chapter.quiz.length}
                            >
                              Trimite răspunsurile
                            </button>
                            <button className="btn-secondary" onClick={() => setShowQuiz(false)}>
                              Anulează
                            </button>
                          </div>
                        ) : (
                          <>
                            <div className={`quiz-result ${quizPassed ? "pass" : "fail"}`}>
                              <span className="result-icon">{quizPassed ? "🌸" : "🌿"}</span>
                              <div>
                                <div className="result-title">
                                  {quizPassed ? "Excelent! Lecție finalizată." : "Mai încearcă o dată"}
                                </div>
                                <div className="result-sub">
                                  {quizPassed
                                    ? "Lecția următoare este acum deblocată."
                                    : "Revizuiește videoul și încearcă din nou."}
                                </div>
                              </div>
                            </div>
                            <div className="quiz-actions">
                              {quizPassed && activeChapter < COURSE_DATA.chapters.length - 1 && (
                                <button className="btn-primary" onClick={handleNextChapter}>
                                  Lecția următoare →
                                </button>
                              )}
                              {!quizPassed && (
                                <button
                                  className="btn-secondary"
                                  onClick={() => {
                                    setQuizAnswers({});
                                    setQuizSubmitted(false);
                                  }}
                                >
                                  Încearcă din nou
                                </button>
                              )}
                            </div>
                          </>
                        )}
                      </div>
                    )}
                  </>
                )}
              </div>
            </div>
          </div>
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<FlorMellowCourse />);
  </script>
</body>
</html>
